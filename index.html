<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#5b54e6" />
  <title>MyLife Hub</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <!-- Android / Chrome add-to-home -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS add-to-home -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MyLife Hub" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body autocapitalize="sentences">
  <div id="app"></div>

  <!-- Firebase SDK (only used when firebase-config.js holds real keys) -->
  <script type="module">
    // Boot: decide local vs firebase mode, then load app.
    import { startApp } from './app.js';
    startApp();
  </script>
</body>
</html>
